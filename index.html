<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Branchess {&#9815;}</title>
  <link rel="icon" href="favicon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/tree.css">
  <link rel="stylesheet" href="css/dialogs.css">
</head>
<body>
  <div id="small-screen-warning">
    <div class="warning-box">
      <span class="warning-icon">&#9815;</span>
      <h2>Branchess</h2>
      <p>Branchess is designed for larger screens. For the best experience, open it on a desktop or laptop.</p>
      <button id="warning-dismiss">Continue anyway</button>
    </div>
  </div>
  <div id="app">
    <div id="board-wrap">
      <div id="file-labels-top" class="file-labels"></div>
      <div id="board-row">
        <div id="rank-labels" class="rank-labels"></div>
        <div id="board"></div>
      </div>
      <div id="file-labels-bottom" class="file-labels"></div>
    </div>
    <div id="panel"></div>
    <div id="setup-panel"></div>
  </div>
  <div id="overlay"></div>
  <script>
    document.getElementById('warning-dismiss').addEventListener('click', function() {
      document.getElementById('small-screen-warning').classList.add('dismissed');
    });
  </script>
  <script type="module" src="js/main.js"></script>
</body>
</html>
